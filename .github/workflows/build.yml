name: Build & Release luci-theme-neon

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'OpenWrt version to build'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - '23.05'
          - '24.10'
          - '25.05'
          - '25.12'
          - 'main'

permissions:
  contents: write

env:
  TZ: Asia/Tehran
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  THEME_NAME: luci-theme-neon
  PKG_VAR: luci_theme_neon
  SDK_23_URL: "https://downloads.openwrt.org/releases/23.05.5/targets/x86/64/openwrt-sdk-23.05.5-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.zst"
  SDK_24_URL: "https://downloads.openwrt.org/releases/24.10.7/targets/x86/64/openwrt-sdk-24.10.7-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
  SDK_25_URL: "https://downloads.openwrt.org/releases/25.05.0/targets/x86/64/openwrt-sdk-25.05.0-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
  SDK_2512_URL: "https://downloads.openwrt.org/releases/25.12.0/targets/x86/64/openwrt-sdk-25.12.0-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst"

jobs:
  build:
    name: Build ${{ matrix.openwrt_version }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - openwrt_version: '23.05'
            sdk_url: ${{ env.SDK_23_URL }}
            package_format: 'ipk'
          - openwrt_version: '24.10'
            sdk_url: ${{ env.SDK_24_URL }}
            package_format: 'ipk'
          - openwrt_version: '25.05'
            sdk_url: ${{ env.SDK_25_URL }}
            package_format: 'apk'
          - openwrt_version: '25.12'
            sdk_url: ${{ env.SDK_2512_URL }}
            package_format: 'apk'
    steps:
      - name: Checkout theme repo
        uses: actions/checkout@v4
        with:
          path: theme_repo

      - name: Extract Version from Makefile
        id: get_version
        working-directory: ./theme_repo
        run: |
          VERSION=$(grep -E 'PKG_VERSION\s*:=\s*' Makefile | sed -E 's/PKG_VERSION\s*:=\s*//' | tr -d ' \n\r')
          RELEASE=$(grep -E 'PKG_RELEASE\s*:=\s*' Makefile | sed -E 's/PKG_RELEASE\s*:=\s*//' | tr -d ' \n\r')
          if [ -z "$VERSION" ]; then VERSION="2.0"; fi
          if [ -z "$RELEASE" ]; then RELEASE="1"; fi
          FULL_VERSION="${VERSION}-${RELEASE}"
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT
          echo "full_version=v${FULL_VERSION}" >> $GITHUB_OUTPUT
          echo "🏷️ Detected Version: v${VERSION} (full: v${FULL_VERSION})"

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential libncurses5-dev gawk git gettext unzip \
            zlib1g-dev file python3 curl wget zstd ca-certificates

      - name: Download OpenWrt SDK
        run: |
          echo "📥 Downloading SDK ${{ matrix.openwrt_version }}..."
          wget -q "${{ matrix.sdk_url }}" -O sdk_${{ matrix.package_format }}.tar.zst
          mkdir -p sdk_${{ matrix.package_format }} && tar --use-compress-program=unzstd -xf sdk_${{ matrix.package_format }}.tar.zst -C sdk_${{ matrix.package_format }} --strip-components=1

      - name: Build Package
        working-directory: ./sdk_${{ matrix.package_format }}
        run: |
          # Only update/install feeds we need (luci + base for luci-base dependency)
          ./scripts/feeds update base luci
          ./scripts/feeds install -a -p base -p luci
          
          # Copy theme to package/
          mkdir -p package/${THEME_NAME}
          cp -r ${GITHUB_WORKSPACE}/theme_repo/* package/${THEME_NAME}/
          
          # Configure
          cat > .config <<EOF
          CONFIG_PACKAGE_${PKG_VAR}=m
          CONFIG_LUCI_JSMIN=n
          CONFIG_LUCI_CSSTIDY=n
          EOF
          make defconfig
          
          # Build
          echo "🔨 Building ${{ matrix.package_format }} for ${{ matrix.openwrt_version }}..."
          make package/${THEME_NAME}/compile -j$(nproc) V=s || true
          
          # Collect artifacts
          mkdir -p ../artifacts/${{ matrix.package_format }}
          find bin/ -type f -name "${THEME_NAME}-*.${{ matrix.package_format }}" -exec cp {} ../artifacts/${{ matrix.package_format }}/ \; 2>/dev/null || true
          find bin/ -type f -name "${THEME_NAME}_*.${{ matrix.package_format }}" -exec cp {} ../artifacts/${{ matrix.package_format }}/ \; 2>/dev/null || true
          find bin/ -type f -name "${PKG_VAR}-*.${{ matrix.package_format }}" -exec cp {} ../artifacts/${{ matrix.package_format }}/ \; 2>/dev/null || true
          find bin/ -type f -name "${PKG_VAR}_*.${{ matrix.package_format }}" -exec cp {} ../artifacts/${{ matrix.package_format }}/ \; 2>/dev/null || true
          echo "📦 ${{ matrix.package_format }} artifacts for ${{ matrix.openwrt_version }}:"
          ls -la ../artifacts/${{ matrix.package_format }}/ || true

      - name: Upload ${{ matrix.package_format }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.openwrt_version }}-${{ matrix.package_format }}
          path: artifacts/${{ matrix.package_format }}/*.${{ matrix.package_format }}
          retention-days: 30

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Delete existing release (if exists)
        run: |
          gh release delete ${{ steps.get_version.outputs.version }} --yes || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: "luci-theme-neon ${{ steps.get_version.outputs.version }}"
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}