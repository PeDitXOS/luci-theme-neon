name: Build & Release luci-theme-neon

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  TZ: Asia/Tehran
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  THEME_NAME: luci-theme-neon
  PKG_VAR: luci_theme_neon
  SDK_IPK_URL: "https://downloads.openwrt.org/releases/24.10.7/targets/x86/64/openwrt-sdk-24.10.7-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
  SDK_APK_URL: "https://downloads.openwrt.org/releases/25.12.5/targets/x86/64/openwrt-sdk-25.12.5-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
  SDK_APK_FALLBACK: "https://downloads.openwrt.org/snapshots/targets/x86/64/openwrt-sdk-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst"

jobs:
  build-and-release:
    name: Build & Release luci-theme-neon
    runs-on: ubuntu-latest
    timeout-minutes: 90
    
    steps:
      - name: Checkout theme repo
        uses: actions/checkout@v4
        with:
          path: theme_repo

      - name: Extract Version from Makefile
        id: get_version
        working-directory: ./theme_repo
        run: |
          VERSION=$(grep -E 'PKG_VERSION\s*:=\s*' Makefile | sed -E 's/PKG_VERSION\s*:=\s*//' | tr -d ' \n\r')
          RELEASE=$(grep -E 'PKG_RELEASE\s*:=\s*' Makefile | sed -E 's/PKG_RELEASE\s*:=\s*//' | tr -d ' \n\r')
          if [ -z "$VERSION" ]; then VERSION="2.0"; fi
          if [ -z "$RELEASE" ]; then RELEASE="1"; fi
          FULL_VERSION="${VERSION}-${RELEASE}"
          echo "version=v${FULL_VERSION}" >> $GITHUB_OUTPUT
          echo "🏷️ Detected Version: v${FULL_VERSION}"

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential libncurses5-dev gawk git gettext unzip \
            zlib1g-dev file python3 curl wget zstd ca-certificates

      # ================= BUILD IPK (SDK 24.10) =================
      - name: Build IPK Package (OpenWrt 24.10 SDK)
        run: |
          echo "📥 Downloading SDK 24.10..."
          wget -q "${SDK_IPK_URL}" -O sdk_ipk.tar.zst
          mkdir -p sdk_ipk && tar --use-compress-program=unzstd -xf sdk_ipk.tar.zst -C sdk_ipk --strip-components=1
          
          cd sdk_ipk
          # Update and install all feeds first
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # Copy theme to package/ (direct, like peditx workflow)
          mkdir -p package/${THEME_NAME}
          cp -r ${GITHUB_WORKSPACE}/theme_repo/* package/${THEME_NAME}/
          
          # Configure
          cat > .config <<EOF
          CONFIG_PACKAGE_${PKG_VAR}=m
          CONFIG_LUCI_JSMIN=n
          CONFIG_LUCI_CSSTIDY=n
          EOF
          make defconfig
          
          # Build
          echo "🔨 Building IPK..."
          make package/${THEME_NAME}/compile -j$(nproc) V=s || true
          
          # Collect artifacts
          mkdir -p ../artifacts/ipk
          find bin/ -type f -name "${THEME_NAME}-*.ipk" -exec cp {} ../artifacts/ipk/ \; 2>/dev/null || true
          find bin/ -type f -name "${THEME_NAME}_*.ipk" -exec cp {} ../artifacts/ipk/ \; 2>/dev/null || true
          find bin/ -type f -name "${PKG_VAR}-*.ipk" -exec cp {} ../artifacts/ipk/ \; 2>/dev/null || true
          find bin/ -type f -name "${PKG_VAR}_*.ipk" -exec cp {} ../artifacts/ipk/ \; 2>/dev/null || true
          echo "📦 IPK artifacts:"
          ls -la ../artifacts/ipk/ || true

      # ================= BUILD APK (SDK 25.12 / SNAPSHOT) =================
      - name: Build APK Package (OpenWrt 25.12 SDK)
        run: |
          echo "📥 Downloading SDK 25.12..."
          if ! wget -q "${SDK_APK_URL}" -O sdk_apk.tar.zst 2>/dev/null; then
            echo "⚠️ 25.12.5 not available, trying SNAPSHOT..."
            wget -q "${SDK_APK_FALLBACK}" -O sdk_apk.tar.zst
          fi
          
          mkdir -p sdk_apk
          tar --use-compress-program=unzstd -xf sdk_apk.tar.zst -C sdk_apk --strip-components=1
          
          cd sdk_apk
          # Update and install all feeds first
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # Copy theme to package/ (direct, like peditx workflow)
          mkdir -p package/${THEME_NAME}
          cp -r ${GITHUB_WORKSPACE}/theme_repo/* package/${THEME_NAME}/
          
          # Configure
          cat > .config <<EOF
          CONFIG_PACKAGE_${PKG_VAR}=m
          CONFIG_LUCI_JSMIN=n
          CONFIG_LUCI_CSSTIDY=n
          EOF
          make defconfig
          
          # Build
          echo "🔨 Building APK..."
          make package/${THEME_NAME}/compile -j$(nproc) V=s || true
          
          # Collect artifacts
          mkdir -p ../artifacts/apk
          find bin/ -type f -name "${THEME_NAME}-*.apk" -exec cp {} ../artifacts/apk/ \; 2>/dev/null || true
          find bin/ -type f -name "${THEME_NAME}_*.apk" -exec cp {} ../artifacts/apk/ \; 2>/dev/null || true
          find bin/ -type f -name "${PKG_VAR}-*.apk" -exec cp {} ../artifacts/apk/ \; 2>/dev/null || true
          find bin/ -type f -name "${PKG_VAR}_*.apk" -exec cp {} ../artifacts/apk/ \; 2>/dev/null || true
          echo "📦 APK artifacts:"
          ls -la ../artifacts/apk/ || true

      # ================= RELEASE =================
      - name: Delete existing release (if exists)
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: |
          gh release delete ${{ steps.get_version.outputs.version }} --yes || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        if: ${{ hashFiles('artifacts/**') != '' }}
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: "luci-theme-neon ${{ steps.get_version.outputs.version }}"
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ startsWith(github.ref, 'refs/tags/') != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## 📦 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Format | Version | Files |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|---------|-------|" >> $GITHUB_STEP_SUMMARY
          IPK_COUNT=$(find artifacts/ipk -name "*.ipk" 2>/dev/null | wc -l)
          APK_COUNT=$(find artifacts/apk -name "*.apk" 2>/dev/null | wc -l)
          echo "| IPK (24.10) | ${{ steps.get_version.outputs.version }} | $IPK_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| APK (25.12/SNAPSHOT) | ${{ steps.get_version.outputs.version }} | $APK_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🎉 **Release:** ${{ steps.get_version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "📁 **Artifacts uploaded to GitHub Release**" >> $GITHUB_STEP_SUMMARY