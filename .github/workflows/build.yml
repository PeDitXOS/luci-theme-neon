name: Build & Release luci-theme-neon

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    tags: [ 'v*' ]

permissions:
  contents: write

env:
  TZ: Asia/Tehran
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  THEME_NAME: luci-theme-neon
  REPO_URL: https://github.com/PeDitXOS/luci-theme-neon.git

jobs:
  build-and-release:
    name: Build & Release luci-theme-neon
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout Theme Repo
        uses: actions/checkout@v4
        with:
          path: theme_repo

      - name: Extract Version from Makefile
        id: get_version
        working-directory: ./theme_repo
        run: |
          VERSION=$(grep -E 'PKG_VERSION\s*:=\s*' Makefile | sed -E 's/PKG_VERSION\s*:=\s*//' | tr -d ' \n\r')
          RELEASE=$(grep -E 'PKG_RELEASE\s*:=\s*' Makefile | sed -E 's/PKG_RELEASE\s*:=\s*//' | tr -d ' \n\r')
          if [ -z "$VERSION" ]; then VERSION="2.0"; fi
          if [ -z "$RELEASE" ]; then RELEASE="1"; fi
          FULL_VERSION="${VERSION}-${RELEASE}"
          echo "version=v${FULL_VERSION}" >> $GITHUB_OUTPUT
          echo "pkg_version=${VERSION}" >> $GITHUB_OUTPUT
          echo "pkg_release=${RELEASE}" >> $GITHUB_OUTPUT
          echo "🏷️ Detected Version: v${FULL_VERSION}"

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential libncurses5-dev gawk git gettext unzip \
            zlib1g-dev file python3 curl wget zstd ca-certificates

      # ================= BUILD IPK (SDK 24.10 - latest stable) =================
      - name: Build IPK Package (OpenWrt 24.10 SDK)
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/24.10.0/targets/x86/64/openwrt-sdk-24.10.0-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.xz"
          echo "📥 Downloading SDK 24.10..."
          wget -q "$SDK_URL" -O sdk_ipk.tar.xz
          mkdir -p sdk_ipk && tar -xJf sdk_ipk.tar.xz -C sdk_ipk --strip-components=1
          
          cd sdk_ipk
          # Add theme as local feed
          echo "src-git neon_theme file://${GITHUB_WORKSPACE}/theme_repo" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # Configure
          cat > .config <<EOF
          CONFIG_PACKAGE_${THEME_NAME//-/_}=m
          CONFIG_LUCI_JSMIN=n
          CONFIG_LUCI_CSSTIDY=n
          EOF
          make defconfig
          
          # Build
          echo "🔨 Building IPK..."
          make package/${THEME_NAME}/compile -j$(nproc) V=s || true
          
          # Collect artifacts
          mkdir -p ../artifacts/ipk
          find bin/ -type f -name "${THEME_NAME}_*.ipk" -exec cp {} ../artifacts/ipk/ \; 2>/dev/null || true
          echo "📦 IPK artifacts:"
          ls -la ../artifacts/ipk/ || true

      # ================= BUILD APK (SDK 25.12 / SNAPSHOT) =================
      - name: Build APK Package (OpenWrt 25.12 SDK)
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/25.12.0/targets/x86/64/openwrt-sdk-25.12.0-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          echo "📥 Downloading SDK 25.12..."
          if ! wget -q "$SDK_URL" -O sdk_apk.tar.zst 2>/dev/null; then
            echo "⚠️ 25.12 not released yet, trying SNAPSHOT..."
            SDK_URL="https://downloads.openwrt.org/snapshots/targets/x86/64/openwrt-sdk-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
            wget -q "$SDK_URL" -O sdk_apk.tar.zst
          fi
          
          mkdir -p sdk_apk
          tar --use-compress-program=unzstd -xf sdk_apk.tar.zst -C sdk_apk --strip-components=1
          
          cd sdk_apk
          # Add theme as local feed
          echo "src-git neon_theme file://${GITHUB_WORKSPACE}/theme_repo" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # Configure
          cat > .config <<EOF
          CONFIG_PACKAGE_${THEME_NAME//-/_}=m
          CONFIG_LUCI_JSMIN=n
          CONFIG_LUCI_CSSTIDY=n
          EOF
          make defconfig
          
          # Build
          echo "🔨 Building APK..."
          make package/${THEME_NAME}/compile -j$(nproc) V=s || true
          
          # Collect artifacts
          mkdir -p ../artifacts/apk
          find bin/ -type f -name "${THEME_NAME}_*.apk" -exec cp {} ../artifacts/apk/ \; 2>/dev/null || true
          echo "📦 APK artifacts:"
          ls -la ../artifacts/apk/ || true

      # ================= RELEASE =================
      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        if: ${{ hashFiles('artifacts/**') != '' }}
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: "luci-theme-neon ${{ steps.get_version.outputs.version }}"
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'refs/tags/') == false }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## 📦 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Format | Version | Files |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|---------|-------|" >> $GITHUB_STEP_SUMMARY
          IPK_COUNT=$(find artifacts/ipk -name "*.ipk" 2>/dev/null | wc -l)
          APK_COUNT=$(find artifacts/apk -name "*.apk" 2>/dev/null | wc -l)
          echo "| IPK (24.10) | ${{ steps.get_version.outputs.version }} | $IPK_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| APK (25.12/SNAPSHOT) | ${{ steps.get_version.outputs.version }} | $APK_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🎉 **Release:** ${{ steps.get_version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "📁 **Artifacts uploaded to GitHub Release**" >> $GITHUB_STEP_SUMMARY