name: Build luci-theme-neon

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FEED_NAME: neon_theme
  PACKAGE_NAME: luci-theme-neon
  PKG_VAR: luci_theme_neon

jobs:
  build-ipk:
    name: Build IPK (24.10 SDK)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout theme
        uses: actions/checkout@v4
        with:
          path: theme_repo

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential libncurses5-dev gawk git gettext unzip \
            zlib1g-dev file python3 curl wget zstd ca-certificates

      - name: Download OpenWrt 24.10.7 SDK (.zst)
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/24.10.7/targets/x86/64/openwrt-sdk-24.10.7-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          echo "📥 Downloading SDK 24.10.7..."
          wget -q "$SDK_URL" -O sdk_ipk.tar.zst
          mkdir -p sdk_ipk && tar --use-compress-program=unzstd -xf sdk_ipk.tar.zst -C sdk_ipk --strip-components=1

      - name: Build IPK Package
        working-directory: ./sdk_ipk
        run: |
          # Add theme as local feed
          echo "src-git ${FEED_NAME} file://${GITHUB_WORKSPACE}/theme_repo" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # Explicitly install our package to package/feeds/
          ./scripts/feeds install ${PACKAGE_NAME}
          
          # Verify
          echo "=== Package location ==="
          ls -la package/feeds/${FEED_NAME}/ 2>/dev/null | grep ${PACKAGE_NAME} || echo "Not in package/feeds/"
          ls -la feeds/${FEED_NAME}/ 2>/dev/null | grep ${PACKAGE_NAME} || echo "Not in feeds/"
          
          # Configure
          cat > .config <<EOF
          CONFIG_PACKAGE_${PKG_VAR}=m
          CONFIG_LUCI_JSMIN=n
          CONFIG_LUCI_CSSTIDY=n
          EOF
          make defconfig
          
          # Build using correct path
          echo "🔨 Building IPK..."
          make package/feeds/${FEED_NAME}/${PACKAGE_NAME}/compile -j$(nproc) V=s || true
          
          # Collect artifacts
          mkdir -p ../artifacts/ipk
          find bin/ -type f -name "${PACKAGE_NAME}_*.ipk" -exec cp {} ../artifacts/ipk/ \; 2>/dev/null || true
          find bin/ -type f -name "${PKG_VAR}_*.ipk" -exec cp {} ../artifacts/ipk/ \; 2>/dev/null || true
          echo "📦 IPK artifacts:"
          ls -la ../artifacts/ipk/ || true

      - name: Upload IPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: 24.10-ipk
          path: artifacts/ipk/*.ipk
          retention-days: 30

  build-apk:
    name: Build APK (25.12 SDK / SNAPSHOT fallback)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout theme
        uses: actions/checkout@v4
        with:
          path: theme_repo

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential libncurses5-dev gawk git gettext unzip \
            zlib1g-dev file python3 curl wget zstd ca-certificates

      - name: Download OpenWrt 25.12.5 SDK (or SNAPSHOT fallback)
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/25.12.5/targets/x86/64/openwrt-sdk-25.12.5-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          echo "📥 Downloading SDK 25.12.5..."
          if ! wget -q "$SDK_URL" -O sdk_apk.tar.zst 2>/dev/null; then
            echo "⚠️ 25.12.5 not available, trying SNAPSHOT..."
            SDK_URL="https://downloads.openwrt.org/snapshots/targets/x86/64/openwrt-sdk-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
            wget -q "$SDK_URL" -O sdk_apk.tar.zst
          fi
          
          mkdir -p sdk_apk
          tar --use-compress-program=unzstd -xf sdk_apk.tar.zst -C sdk_apk --strip-components=1

      - name: Build APK Package
        working-directory: ./sdk_apk
        run: |
          # Add theme as local feed
          echo "src-git ${FEED_NAME} file://${GITHUB_WORKSPACE}/theme_repo" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # Explicitly install our package to package/feeds/
          ./scripts/feeds install ${PACKAGE_NAME}
          
          # Verify
          echo "=== Package location ==="
          ls -la package/feeds/${FEED_NAME}/ 2>/dev/null | grep ${PACKAGE_NAME} || echo "Not in package/feeds/"
          ls -la feeds/${FEED_NAME}/ 2>/dev/null | grep ${PACKAGE_NAME} || echo "Not in feeds/"
          
          # Configure
          cat > .config <<EOF
          CONFIG_PACKAGE_${PKG_VAR}=m
          CONFIG_LUCI_JSMIN=n
          CONFIG_LUCI_CSSTIDY=n
          EOF
          make defconfig
          
          # Build using correct path
          echo "🔨 Building APK..."
          make package/feeds/${FEED_NAME}/${PACKAGE_NAME}/compile -j$(nproc) V=s || true
          
          # Collect artifacts
          mkdir -p ../artifacts/apk
          find bin/ -type f -name "${PACKAGE_NAME}_*.apk" -exec cp {} ../artifacts/apk/ \; 2>/dev/null || true
          find bin/ -type f -name "${PKG_VAR}_*.apk" -exec cp {} ../artifacts/apk/ \; 2>/dev/null || true
          echo "📦 APK artifacts:"
          ls -la ../artifacts/apk/ || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: 25.12-apk
          path: artifacts/apk/*.apk
          retention-days: 30

  release:
    name: Create Release
    needs: [build-ipk, build-apk]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ env.PACKAGE_NAME }} ${{ github.ref_name }}"
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}